name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Read plugin version
        id: version
        run: echo "version=$(node -p \"require('./manifest.json').version\")" >> "$GITHUB_OUTPUT"
      - name: Package plugin
        run: zip just-audio-player-${{ steps.version.outputs.version }}.zip manifest.json main.js styles.css
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Just Audio Player ${{ steps.version.outputs.version }}
          files: |
            manifest.json
            main.js
            styles.css
            just-audio-player-${{ steps.version.outputs.version }}.zip
