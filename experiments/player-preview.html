<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Just Audio Player preview</title>
		<link rel="stylesheet" href="../styles.css">
		<style>
			:root {
				--background-primary: #202124;
				--background-secondary: #2b2d31;
				--background-modifier-border: #3f424a;
				--font-ui-smaller: 12px;
				--interactive-accent: #7aa2f7;
				--interactive-hover: #414550;
				--interactive-normal: #30333a;
				--layer-popover: 30;
				--shadow-s: 0 8px 24px rgb(0 0 0 / 30%);
				--text-muted: #b7bbc6;
				--text-normal: #eceff4;
				--text-on-accent: #0f172a;
			}

			body {
				min-height: 100vh;
				margin: 0;
				color: var(--text-normal);
				background: var(--background-primary);
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}

			.preview-workspace {
				min-height: 100vh;
				background:
					linear-gradient(90deg, var(--background-secondary) 0 248px, transparent 248px),
					var(--background-primary);
			}

			.preview-note {
				max-width: 680px;
				padding: 48px 32px;
				margin-left: 280px;
			}

			.preview-note h1 {
				margin: 0 0 16px;
				font-size: 24px;
				font-weight: 650;
			}

			.preview-note p {
				max-width: 58ch;
				color: var(--text-muted);
				line-height: 1.55;
			}
		</style>
	</head>
	<body>
		<div class="preview-workspace">
			<main class="preview-note">
				<h1>Audio note</h1>
				<p>The native audio embed remains in the note. The floating player appears after playback starts and mirrors the same media element.</p>
				<audio controls src=""></audio>
			</main>
		</div>

		<div class="just-audio-player is-bottom-right" style="--just-audio-player-width: 360px" role="region" aria-label="Active audio player">
			<button class="just-audio-player__button" type="button" aria-label="Pause audio" title="Pause">
				<svg viewBox="0 0 24 24" aria-hidden="true">
					<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"></rect>
					<rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"></rect>
				</svg>
			</button>
			<span class="just-audio-player__time">0:30</span>
			<input class="just-audio-player__timeline" type="range" min="0" max="1000" step="1" value="250" aria-label="Audio timeline">
			<span class="just-audio-player__time">2:00</span>
		</div>
	</body>
</html>
